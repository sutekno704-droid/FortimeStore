<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Akun - GameTopStore</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <h2>GameTop<span>Store</span></h2>
                </div>
                <nav class="nav-menu">
                    <ul>
                        <li><a href="index.html">Beranda</a></li>
                        <li><a href="index.html#game">Semua Game</a></li>
                        <li><a href="index.html#berita">Berita</a></li>
                        <li><a href="akun.html">Akun</a></li>
                    </ul>
                </nav>
                <div class="auth-buttons">
                    <a href="daftar.html" class="btn btn-primary">Daftar</a>
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fa fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Konten Utama -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-card">
                <h2><i class="fa fa-user-circle"></i> Masuk Akun</h2>
                <div id="alertBox" class="alert" style="display: none;"></div>
                
                <form id="formLogin">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required placeholder="Masukkan email Anda">
                    </div>
                    <div class="form-group">
                        <label>Kata Sandi</label>
                        <input type="password" id="password" required placeholder="Masukkan kata sandi">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top:10px;">Masuk Sekarang</button>
                </form>

                <div class="text-center">
                    <p>Belum punya akun? <a href="daftar.html">Daftar di sini</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 GameTopStore. Semua hak dilindungi undang-undang.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
