<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akun Saya - GameTopStore</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <h2>GameTop<span>Store</span></h2>
                </div>
                <nav class="nav-menu">
                    <ul>
                        <li><a href="index.html">Beranda</a></li>
                        <li><a href="index.html#game">Semua Game</a></li>
                        <li><a href="index.html#berita">Berita</a></li>
                    </ul>
                </nav>
                <div class="auth-buttons">
                    <button onclick="logout()" class="btn btn-outline">Keluar</button>
                </div>
            </div>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <div class="account-grid">
                <div class="account-sidebar">
                    <h3 style="margin-bottom:20px;">Menu Akun</h3>
                    <ul>
                        <li><a href="#" class="active"><i class="fa fa-history"></i> Riwayat Transaksi</a></li>
                        <li><a href="#"><i class="fa fa-user"></i> Data Akun</a></li>
                        <li><a href="#"><i class="fa fa-question-circle"></i> Bantuan</a></li>
                    </ul>
                </div>

                <div class="account-content">
                    <h2 style="margin-bottom:25px;">Data Akun</h2>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:40px;">
                        <div><strong>Nama:</strong> <span id="namaPengguna">-</span></div>
                        <div><strong>Email:</strong> <span id="emailPengguna">-</span></div>
                        <div><strong>No. HP:</strong> <span id="noHpPengguna">-</span></div>
                        <div><strong>Tanggal Daftar:</strong> <span id="tanggalDaftar">-</span></div>
                    </div>

                    <h3 style="margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid #eee;">Riwayat Transaksi</h3>
                    <table class="transaction-table">
                        <thead>
                            <tr>
                                <th>ID Transaksi</th>
                                <th>Game</th>
                                <th>Item</th>
                                <th>Total</th>
                                <th>Tanggal</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelTransaksi">
                            <!-- Data akan dimuat otomatis -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 GameTopStore. Semua hak dilindungi undang-undang.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
